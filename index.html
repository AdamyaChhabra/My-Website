<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitLife</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎥 VIDEO -->
<video autoplay muted loop id="bgVideo">
    <source src="fitness_background.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- 🔥 NAVBAR -->
<header class="navbar">
    <div class="logo">🔥 FitLife</div>
    <nav>
        <a href="#">Home</a>
        <a href="#auth">Get Started</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Transform Your Body</h1>
    <p>Your AI-powered fitness partner</p>
    <button onclick="scrollToAuth()">Get Started</button>
</section>

<!-- AUTH -->
<section id="auth">
<div class="auth-box">

<h2 id="authTitle">Create Account</h2>

<form id="signupForm">
<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<button type="submit">Sign Up</button>
</form>

<form id="loginForm" class="hidden">
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">
<button type="submit">Login</button>
</form>

<p id="toggleText">
Already have an account? <span onclick="toggleAuth()">Login</span>
</p>

</div>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="hidden">

<h2>🏋️ Dashboard</h2>

<div class="grid">

<div class="card">
<h3>Workout</h3>
<ul id="workoutList"></ul>
</div>

<div class="card">
<h3>Diet</h3>
<ul id="dietList"></ul>
</div>

<div class="card">
<h3>AI Trainer 🤖</h3>

<input id="weight" placeholder="Weight">
<input id="height" placeholder="Height">

<select id="goal">
<option value="weight loss">Weight Loss</option>
<option value="muscle gain">Muscle Gain</option>
</select>

<button onclick="generatePlan()">Generate</button>

<div id="aiResult"></div>

</div>

</div>

</section>

<script src="script.js"></script>
</body>
</html>
